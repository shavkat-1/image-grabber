version: '3.8'

services:
  app:
    build: .
    container_name: image-grabber-app
    volumes:
      - ./app:/var/www
    networks:
      - sf_net
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1

  nginx:
    image: nginx:alpine
    container_name: image-grabber-nginx
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - sf_net

networks:
  sf_net:
    driver: bridge
